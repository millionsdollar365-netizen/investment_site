<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" fill="none">
  <!-- Diamond/Gem icon -->
  <g transform="translate(0, 3)">
    <polygon points="25,2 48,18 25,34 2,18" fill="url(#goldGrad)" stroke="url(#goldStroke)" stroke-width="1.5"/>
    <polygon points="25,10 38,18 25,26 12,18" fill="rgba(255,255,255,.25)"/>
    <polygon points="25,16 32,20 25,24 18,20" fill="rgba(255,255,255,.4)"/>
  </g>
  <!-- Text -->
  <text x="58" y="26" font-family="Inter, sans-serif" font-weight="800" font-size="18" fill="url(#goldGrad)">PRIMEAXIS</text>
  <text x="58" y="46" font-family="Inter, sans-serif" font-weight="500" font-size="11" fill="#94a3b8" letter-spacing="0.12em">INVESTMENT</text>
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
  </defs>
</svg>
